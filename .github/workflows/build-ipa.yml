name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  build-ios:
    name: build-ios
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust toolchain (iOS target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install dependencies
        run: npm ci

      - name: Resolve iOS Team ID
        id: ios_team
        run: |
          TEAM="$(node -e 'const fs=require("fs");try{const c=JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json","utf8"));process.stdout.write((c?.bundle?.iOS?.developmentTeam||"").trim())}catch{process.stdout.write("")}')"
          if [ -z "$TEAM" ]; then TEAM="SIMULATR00"; fi
          echo "team=$TEAM" >> "$GITHUB_OUTPUT"
          echo "Using Team ID: $TEAM"

      - name: Ensure iOS project initialized
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            npm run tauri:ios:init
          fi

      - name: Disable Xcode user script sandbox
        run: |
          PBXPROJ="src-tauri/gen/apple/app.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ" ]; then
            perl -0pi -e 's/ENABLE_USER_SCRIPT_SANDBOXING = YES;/ENABLE_USER_SCRIPT_SANDBOXING = NO;/g' "$PBXPROJ"
          fi

      - name: Build unsigned iOS app
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ steps.ios_team.outputs.team }}
        run: |
          mkdir -p artifacts/ios
          xcodebuild build \
            -workspace src-tauri/gen/apple/app.xcodeproj/project.xcworkspace \
            -scheme app_iOS \
            -configuration release \
            -sdk iphoneos \
            -derivedDataPath src-tauri/gen/apple/build/ci-derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee artifacts/ios/build-ios.log

      - name: Package IPA
        run: |
          mkdir -p artifacts/ios/Payload
          APP_PATH="$(find src-tauri/gen/apple/build/ci-derived/Build/Products/release-iphoneos -maxdepth 1 -type d -name '*.app' | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found under release-iphoneos"
            exit 1
          fi
          cp -R "$APP_PATH" artifacts/ios/Payload/
          (cd artifacts/ios && zip -qry Kandian-iOS-unsigned.ipa Payload)
          rm -rf artifacts/ios/Payload
          shasum -a 256 artifacts/ios/Kandian-iOS-unsigned.ipa > artifacts/ios/Kandian-iOS-unsigned.ipa.sha256

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/ios/*

  build-android:
    name: build-android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust toolchain (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;29.0.13846066"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android project initialized
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            npm run tauri:android:init
          fi

      - name: Build Android packages
        run: |
          mkdir -p artifacts/android
          npm run tauri:android:build 2>&1 | tee artifacts/android/build-android.log

          FOUND=0
          while IFS= read -r FILE; do
            cp "$FILE" "artifacts/android/"
            FOUND=1
          done < <(find src-tauri/gen/android/app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \))

          if [ "$FOUND" -eq 0 ]; then
            echo "No APK/AAB found in Android build outputs."
            exit 1
          fi

          (cd artifacts/android && for f in *.apk *.aab; do [ -f "$f" ] && sha256sum "$f"; done) > artifacts/android/SHA256SUMS.txt

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-packages
          path: artifacts/android/*

  build-desktop:
    name: build-desktop
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build desktop bundle
        run: |
          mkdir -p artifacts/desktop
          npm run tauri:build -- --bundles app,dmg 2>&1 | tee artifacts/desktop/build-desktop.log

      - name: Collect DMG
        run: |
          mkdir -p artifacts/desktop
          FOUND=0
          while IFS= read -r FILE; do
            cp "$FILE" artifacts/desktop/
            FOUND=1
          done < <(find src-tauri/target -type f -name "*.dmg" 2>/dev/null || true)

          if [ "$FOUND" -eq 0 ]; then
            APP_PATH="$(find src-tauri/target -type d -path "*/bundle/macos/*.app" | head -n1 || true)"
            if [ -n "${APP_PATH:-}" ]; then
              DMG_NAME="Kandian-macOS-${{ github.run_number }}.dmg"
              hdiutil create -volname "Kandian" -srcfolder "$APP_PATH" -ov -format UDZO "artifacts/desktop/${DMG_NAME}"
              FOUND=1
            fi
          fi

          if [ "$FOUND" -eq 0 ]; then
            echo "No DMG generated."
            echo "Target bundle tree:"
            find src-tauri/target -maxdepth 5 -type d | sed -n '1,200p'
            exit 1
          fi

          (cd artifacts/desktop && for f in *.dmg; do [ -f "$f" ] && shasum -a 256 "$f"; done) > artifacts/desktop/SHA256SUMS.txt

      - name: Upload desktop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dmg
          path: artifacts/desktop/*
          if-no-files-found: ignore

  release:
    name: release
    needs: [build-ios, build-android, build-desktop]
    if: ${{ needs.build-ios.result == 'success' && needs.build-android.result == 'success' && needs.build-desktop.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release notes
        id: notes
        run: |
          TAG="v2.0.${{ github.run_number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          {
            echo "## 下载文件"
            echo ""
            echo "### 构建产物"
            echo ""
            echo "- iOS: unsigned IPA（可用于后续自签）"
            echo "- Android: APK/AAB"
            echo "- macOS: DMG"
            echo ""
            echo "### 构建日志"
            echo ""
            echo "- 完整 Actions 运行日志: ${RUN_URL}"
            echo "- 附件内包含 `build-ios.log` / `build-android.log` / `build-desktop.log`"
            echo ""
            echo "### 校验信息"
            echo ""
            echo '```text'
            find release-assets -type f \( -name "*.sha256" -o -name "SHA256SUMS.txt" \) -print -exec cat {} \;
            echo '```'
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: 看点 ${{ steps.notes.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            release-assets/**/*
