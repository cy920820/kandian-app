name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  build-ios:
    name: build-ios
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust toolchain (iOS target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install dependencies
        run: npm ci

      - name: Ensure iOS project initialized
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            npm run tauri:ios:init
          fi

      - name: Build web assets
        run: npm run build:web

      - name: Prepare iOS native inputs
        run: |
          set -euo pipefail
          mkdir -p src-tauri/gen/apple/assets
          rm -rf src-tauri/gen/apple/assets/*
          cp -R dist/. src-tauri/gen/apple/assets/

          cargo build \
            --manifest-path src-tauri/Cargo.toml \
            --target aarch64-apple-ios \
            --release

          RUST_LIB="src-tauri/target/aarch64-apple-ios/release/libapp_lib.a"
          if [ ! -f "$RUST_LIB" ]; then
            echo "Rust static library not found: $RUST_LIB"
            ls -la src-tauri/target/aarch64-apple-ios/release || true
            exit 1
          fi

          mkdir -p src-tauri/gen/apple/Externals/arm64/release src-tauri/gen/apple/Externals/x86_64/release
          cp "$RUST_LIB" src-tauri/gen/apple/Externals/arm64/release/libapp.a
          cp "$RUST_LIB" src-tauri/gen/apple/Externals/x86_64/release/libapp.a

          PBXPROJ="src-tauri/gen/apple/app.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ" ]; then
            perl -0pi -e 's/ENABLE_USER_SCRIPT_SANDBOXING = YES;/ENABLE_USER_SCRIPT_SANDBOXING = NO;/g' "$PBXPROJ"
            perl -0pi -e 's#shellScript = "npm run -- tauri ios xcode-script.*?";#shellScript = "echo \\"Skip tauri ios xcode-script in CI\\"";#s' "$PBXPROJ"
          fi

      - name: Build unsigned iOS app
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios
          if ! xcodebuild build \
            -workspace src-tauri/gen/apple/app.xcodeproj/project.xcworkspace \
            -scheme app_iOS \
            -configuration release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath src-tauri/gen/apple/build/ci-derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee artifacts/ios/build-ios.log; then
              echo "xcodebuild failed. Key diagnostics:"
              grep -E "error:|fatal error:|BUILD FAILED|CodeSign|Provisioning|No signing certificate|requires a development team" artifacts/ios/build-ios.log | tail -n 80 || true
              echo "---- Last 200 lines of build-ios.log ----"
              tail -n 200 artifacts/ios/build-ios.log || true
              exit 1
          fi

      - name: Package IPA
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios/Payload
          PRODUCTS_DIR="src-tauri/gen/apple/build/ci-derived/Build/Products"
          if [ ! -d "$PRODUCTS_DIR" ]; then
            echo "Products directory not found: $PRODUCTS_DIR"
            exit 1
          fi
          echo "Discovered .app bundles under $PRODUCTS_DIR:"
          find "$PRODUCTS_DIR" -maxdepth 3 -type d -name '*.app' -print || true

          APP_PATH="$(find "$PRODUCTS_DIR" -maxdepth 3 -type d -name '*.app' \( -path '*/Release-iphoneos/*' -o -path '*/release-iphoneos/*' \) | head -n1)"
          if [ -z "$APP_PATH" ]; then
            APP_PATH="$(find "$PRODUCTS_DIR" -maxdepth 3 -type d -name '*.app' | head -n1)"
          fi
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in derived products."
            exit 1
          fi

          PAYLOAD_APP="artifacts/ios/Payload/$(basename "$APP_PATH")"
          ditto "$APP_PATH" "$PAYLOAD_APP"

          if [ ! -f "$PAYLOAD_APP/Info.plist" ]; then
            echo "Invalid app bundle: missing Info.plist in $PAYLOAD_APP"
            exit 1
          fi

          rm -rf "$PAYLOAD_APP/_CodeSignature"
          rm -f "$PAYLOAD_APP/embedded.mobileprovision"
          while IFS= read -r f; do
            codesign --remove-signature "$f" >/dev/null 2>&1 || true
          done < <(find "$PAYLOAD_APP" -type f)
          (cd artifacts/ios && /usr/bin/zip -qry Kandian-iOS-unsigned.ipa Payload)
          if ! LC_ALL=C unzip -l artifacts/ios/Kandian-iOS-unsigned.ipa | LC_ALL=C grep -E "Payload/.+\\.app/Info\\.plist" >/dev/null; then
            echo "IPA structure invalid: missing Payload/*.app/Info.plist"
            exit 1
          fi
          rm -rf artifacts/ios/Payload
          IPA_SIZE="$(stat -f%z artifacts/ios/Kandian-iOS-unsigned.ipa)"
          if [ "$IPA_SIZE" -lt 1048576 ]; then
            echo "IPA seems invalid (too small): ${IPA_SIZE} bytes"
            exit 1
          fi
          shasum -a 256 artifacts/ios/Kandian-iOS-unsigned.ipa > artifacts/ios/Kandian-iOS-unsigned.ipa.sha256

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/ios/*

  build-android:
    name: build-android
    needs: [build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust toolchain (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;29.0.13846066"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android project initialized
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            npm run tauri:android:init
          fi

      - name: Build Android packages
        run: |
          set -euo pipefail
          mkdir -p artifacts/android
          npm run tauri:android:build 2>&1 | tee artifacts/android/build-android.log

          FOUND=0
          while IFS= read -r FILE; do
            cp "$FILE" "artifacts/android/"
            FOUND=1
          done < <(find src-tauri/gen/android/app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \))

          if [ "$FOUND" -eq 0 ]; then
            echo "No APK/AAB found in Android build outputs."
            exit 1
          fi

          (cd artifacts/android && for f in *.apk *.aab; do [ -f "$f" ] && sha256sum "$f"; done) > artifacts/android/Kandian-Android-SHA256SUMS.txt

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-packages
          path: artifacts/android/*

  build-desktop:
    name: build-desktop
    needs: [build-ios]
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build desktop bundle
        run: |
          set -euo pipefail
          mkdir -p artifacts/desktop
          npm run tauri:build -- --bundles app 2>&1 | tee artifacts/desktop/build-desktop.log

      - name: Collect DMG
        run: |
          mkdir -p artifacts/desktop
          APP_PATH="$(find src-tauri/target -type d -path "*/bundle/macos/*.app" | head -n1 || true)"
          if [ -z "${APP_PATH:-}" ]; then
            echo "No macOS .app found."
            find src-tauri/target -maxdepth 5 -type d | sed -n '1,200p'
            exit 1
          fi

          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"

          hdiutil create -volname "Kandian" -srcfolder "$APP_PATH" -ov -format UDZO "artifacts/desktop/Kandian-macOS.dmg"
          DMG_SIZE="$(stat -f%z artifacts/desktop/Kandian-macOS.dmg)"
          if [ "$DMG_SIZE" -lt 1048576 ]; then
            echo "DMG seems invalid (too small): ${DMG_SIZE} bytes"
            exit 1
          fi

          shasum -a 256 artifacts/desktop/Kandian-macOS.dmg > artifacts/desktop/Kandian-macOS-SHA256SUMS.txt

      - name: Upload desktop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dmg
          path: artifacts/desktop/*
          if-no-files-found: ignore

  release:
    name: release
    needs: [build-ios, build-android, build-desktop]
    if: ${{ needs.build-ios.result == 'success' && needs.build-android.result == 'success' && needs.build-desktop.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release notes
        id: notes
        run: |
          TAG="v2.0.${{ github.run_number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          {
            echo "## 下载文件"
            echo ""
            echo "### 构建产物"
            echo ""
            echo "- Kandian-iOS-unsigned.ipa（iOS unsigned，后续可自签）"
            echo "- Kandian-Android.apk"
            echo "- Kandian-Android.aab"
            echo "- Kandian-macOS.dmg"
            echo ""
            echo "### 构建日志"
            echo ""
            echo "- 完整 Actions 运行日志: ${RUN_URL}"
            echo "- 本次 Release 只上传安装包，构建日志请在 Actions 页面查看"
          } > RELEASE_NOTES.md

      - name: Stage release files
        run: |
          mkdir -p release-upload
          IOS_IPA="$(find release-assets -type f -name "*.ipa" | sort | head -n1)"
          DMG_FILE="$(find release-assets -type f -name "*.dmg" | sort | head -n1)"

          APK_FILE="$(
            find release-assets -type f -name "*.apk" | sort \
              | awk '/universal.*release/ {print; found=1; exit} END {if (!found) print ""}'
          )"
          if [ -z "$APK_FILE" ]; then
            APK_FILE="$(find release-assets -type f -name "*.apk" | sort | head -n1)"
          fi

          AAB_FILE="$(
            find release-assets -type f -name "*.aab" | sort \
              | awk '/release/ {print; found=1; exit} END {if (!found) print ""}'
          )"
          if [ -z "$AAB_FILE" ]; then
            AAB_FILE="$(find release-assets -type f -name "*.aab" | sort | head -n1)"
          fi

          [ -n "${IOS_IPA:-}" ] && cp "$IOS_IPA" release-upload/Kandian-iOS-unsigned.ipa
          [ -n "${APK_FILE:-}" ] && cp "$APK_FILE" release-upload/Kandian-Android.apk
          [ -n "${AAB_FILE:-}" ] && cp "$AAB_FILE" release-upload/Kandian-Android.aab
          [ -n "${DMG_FILE:-}" ] && cp "$DMG_FILE" release-upload/Kandian-macOS.dmg

          for required in Kandian-iOS-unsigned.ipa Kandian-Android.apk Kandian-macOS.dmg; do
            if [ ! -f "release-upload/${required}" ]; then
              echo "Missing required release package: ${required}"
              find release-assets -type f | sed -n '1,200p'
              exit 1
            fi
          done

          IOS_SIZE="$(stat -c%s release-upload/Kandian-iOS-unsigned.ipa)"
          if [ "$IOS_SIZE" -lt 1048576 ]; then
            echo "Staged IPA too small (${IOS_SIZE} bytes), abort release."
            exit 1
          fi

          DMG_SIZE="$(stat -c%s release-upload/Kandian-macOS.dmg)"
          if [ "$DMG_SIZE" -lt 1048576 ]; then
            echo "Staged DMG too small (${DMG_SIZE} bytes), abort release."
            exit 1
          fi

          COUNT="$(find release-upload -type f | wc -l | tr -d ' ')"
          if [ "$COUNT" -eq 0 ]; then
            echo "No package files staged for release."
            find release-assets -type f | sed -n '1,200p'
            exit 1
          fi

          echo "Staged release files:"
          find release-upload -type f -maxdepth 1 -print | sed -n '1,200p'

      - name: Clean old assets for same tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.notes.outputs.tag }}';
            const { owner, repo } = context.repo;
            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              const assets = release.data.assets || [];
              core.info(`Found existing release ${tag}, deleting ${assets.length} assets...`);
              for (const asset of assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id
                });
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release for tag ${tag}, skip cleanup.`);
              } else {
                throw error;
              }
            }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: 看点 ${{ steps.notes.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            release-upload/*
